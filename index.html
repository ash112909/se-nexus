<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartEquip — Mid-County Rental</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; background: #F5F2EE; }
.view { display: none; }
.view.active { display: flex; }
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>
<link rel="stylesheet" href="styles/shared.css"/>
</head>
<body>
<div id="app">
  <div id="view-dashboard" class="view active"></div>
  <div id="view-wo-detail" class="view"></div>
  <div id="view-parts-search" class="view"></div>
  <div id="view-diagnostics" class="view"></div>
  <div id="view-manuals" class="view"></div>
  <div id="view-recommended" class="view"></div>
</div>
<script src="js/sidebar.js"></script>
<script src="js/router.js"></script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/wo-detail.js"></script>
<script src="js/views/parts-search.js"></script>
<script src="js/views/diagnostics.js"></script>
<script src="js/views/manuals.js"></script>
<script src="js/views/recommended.js"></script>
<script>
  window.addEventListener('load', () => {
    Router.navigate('dashboard');
  });
</script>
</body>
</html>
