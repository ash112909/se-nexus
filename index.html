<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartEquip — Mid-County Rental</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; background: #F5F2EE; }
#app { height: 100%; }
.view { display: none; }
.view.active { display: block; width: 100%; min-height: 100vh; }
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>
<link rel="stylesheet" href="styles/shared.css"/>
</head>
<body>
<div id="app">
  <div id="view-login" class="view active"></div>
  <div id="view-dashboard" class="view"></div>
  <div id="view-wo-list" class="view"></div>
  <div id="view-wo-detail" class="view"></div>
  <div id="view-parts-search" class="view"></div>
  <div id="view-order-history" class="view"></div>
  <div id="view-diagnostics" class="view"></div>
  <div id="view-manuals" class="view"></div>
  <div id="view-recommended" class="view"></div>
  <div id="view-news" class="view"></div>
  <div id="view-approvals" class="view"></div>
</div>
<script src="js/store.js?v=15"></script>
<script src="js/modal.js?v=15"></script>
<script src="js/sidebar.js?v=15"></script>
<script src="js/router.js?v=15"></script>
<script src="js/views/login.js?v=15"></script>
<script src="js/views/dashboard.js?v=15"></script>
<script src="js/views/wo-list.js?v=15"></script>
<script src="js/views/wo-detail.js?v=15"></script>
<script src="js/views/parts-search.js?v=15"></script>
<script src="js/views/order-history.js?v=15"></script>
<script src="js/views/diagnostics.js?v=15"></script>
<script src="js/views/manuals.js?v=15"></script>
<script src="js/views/recommended.js?v=15"></script>
<script src="js/views/news.js?v=15"></script>
<script src="js/views/approvals.js?v=15"></script>
<script src="js/global-search.js?v=15"></script>
<script src="js/user-panel.js?v=15"></script>
<script>
  window.addEventListener('load', () => {
    GlobalSearch.init();
    UserPanel.init();
    Router.navigate('login');
  });
</script>
</body>
</html>
